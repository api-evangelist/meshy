specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Meshy
providerId: meshy
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- 3D
- Generation
- Texturing
- Animation
- Plans
description: >-
  Meshy offers four tiers (Free / Pro / Studio / Enterprise) using monthly credit
  allocations and concurrent task caps. Per-task credit consumption is returned in the API
  response (consumed_credits). Enterprise unlocks full API access, forever asset retention,
  and 50+ concurrent tasks.
notes: Reconciled from the public Meshy pricing page (May 2026).
sources:
- https://www.meshy.ai/pricing
plans:
- id: meshy-free
  name: Free
  type: free
  description: 100 monthly credits, 1 concurrent task, low queue priority, non-commercial license (CC BY 4.0).
  entries:
  - label: Plan Fee
    name: plan_fee
    type: flat
    metric: month
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 0 USD/month
    userMultiplied: false
  - label: Monthly Credits
    name: monthly_credits
    type: per_unit
    metric: credit
    limit: 100
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  elements:
  - name: 1 concurrent task
  - name: Low queue priority
  - name: Non-commercial CC BY 4.0
- id: meshy-pro
  name: Pro
  type: subscription
  description: 1,000 credits/month (~100 assets), 10 concurrent tasks, 60% faster generation, 4 free retries/task, private license.
  entries:
  - label: Monthly Credits
    name: monthly_credits
    type: per_unit
    metric: credit
    limit: 1000
    timeFrame: month
    geo: global
    unit: 1
    price: see meshy.ai/pricing
    userMultiplied: false
  elements:
  - name: 10 concurrent tasks
  - name: High queue priority
  - name: 60% faster generation
  - name: 4 free retries per task
  - name: Private license
- id: meshy-studio
  name: Studio
  type: subscription
  description: 4,000 credits/month (~400 assets), 20 concurrent tasks, team management, centralized billing.
  entries:
  - label: Monthly Credits
    name: monthly_credits
    type: per_unit
    metric: credit
    limit: 4000
    timeFrame: month
    geo: global
    unit: 1
    price: see meshy.ai/pricing
    userMultiplied: false
  elements:
  - name: 20 concurrent tasks
  - name: 60% faster generation
  - name: 8 free retries per task
- id: meshy-enterprise
  name: Enterprise
  type: enterprise
  description: 50+ concurrent tasks, unlimited free retries, full API access, forever API asset retention.
  entries:
  - label: Enterprise Contract
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
maintainers:
