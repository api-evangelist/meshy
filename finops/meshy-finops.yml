specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Meshy
providerId: meshy
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- 3D
- Generation
- Texturing
- Animation
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps view of Meshy. Meshy bundles monthly credits in subscription tiers
  (Free 100, Pro 1,000, Studio 4,000, Enterprise custom). Per-task credit cost is returned
  as consumed_credits in the API response. Free retries (4 Pro / 8 Studio / unlimited
  Enterprise) reduce the effective per-asset cost.
notes: Right-size the plan tier vs expected monthly credit burn; plan upgrade is the dominant cost lever.
sources:
- https://www.meshy.ai/pricing
- https://docs.meshy.ai/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Meshy
serviceCategory: AI
billingModel:
  pricingCategory: Subscription with Credit Allocation + Per-Task Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Meshy 3D API
  ServiceCategory: AI
  ProviderName: Meshy
  PublisherName: Meshy
  InvoiceIssuerName: Meshy
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: text_to_3d_credits
  description: Credits consumed by Text-to-3D tasks (preview + refine).
  unit: credit
  aggregation: sum
  dimensions:
  - account
  - phase
- name: image_to_3d_credits
  description: Credits consumed by Image-to-3D and Multi Image-to-3D tasks.
  unit: credit
  aggregation: sum
  dimensions:
  - account
- name: animation_credits
  description: Credits consumed by Rigging / Animation / Retexture / Remesh tasks.
  unit: credit
  aggregation: sum
  dimensions:
  - account
  - operation
- name: print_analysis_credits
  description: Credits consumed by Multi-Color Print, Analyze Printability, and Repair Printability tasks.
  unit: credit
  aggregation: sum
  dimensions:
  - account
- name: monthly_credits_allocated
  description: Plan-tier monthly credit allocation.
  unit: credit
  aggregation: max
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Read consumed_credits from each API response and aggregate per task type.
- name: Allocation
  description: Tag tasks to consuming game/app/team.
- name: Optimization
  description: Use Pro/Studio retries before paying for re-generation; right-size plan to match monthly credit burn.
- name: Accountability
  description: Assign credit-budget owner per consuming workspace.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
