name: Meshy
kind: company
description: >-
  Meshy is an AI 3D model generation platform offering Text-to-3D, Image-to-3D, Multi
  Image-to-3D, Remesh, Rigging, Animation, Retexture, Text-to-Image, Image-to-Image,
  Multi-Color Print, Analyze Printability, and Repair Printability APIs. The Meshy REST API
  is at https://api.meshy.ai with bearer token authentication.
